  <script>
// ═══════════════════════════════════════
// AUTH WRAPPER
// ═══════════════════════════════════════
const { useState: uS, useEffect: uE } = React;
const h = React.createElement;

function LoginScreen({ onLogin, onSignup }) {
  const [email, setEmail] = uS("");
  const [pass, setPass] = uS("");
  const [error, setError] = uS("");
  const [loading, setLoading] = uS(false);
  const [mode, setMode] = uS("login");

  const validate = () => {
    if (!email.endsWith("@" + ALLOWED_DOMAIN)) {
      setError("Acesso restrito a emails @" + ALLOWED_DOMAIN);
      return false;
    }
    if (pass.length < 6) {
      setError("Senha deve ter no mínimo 6 caracteres");
      return false;
    }
    return true;
  };

  const handle = async (fn) => {
    if (!validate()) return;
    setLoading(true); setError("");
    try { await fn(email, pass); }
    catch(e) {
      const msgs = {
        "auth/user-not-found": "Usuário não encontrado. Crie uma conta.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/invalid-credential": "Email ou senha incorretos.",
        "auth/email-already-in-use": "Este email já está cadastrado. Faça login.",
        "auth/weak-password": "Senha muito fraca (mínimo 6 caracteres).",
        "auth/invalid-email": "Email inválido.",
      };
      setError(msgs[e.code] || e.message);
    }
    setLoading(false);
  };

  return h("div", { className: "login-wrap" },
    h("div", { className: "login-box" },
      h("h1", null, "🇺🇸 Austin Shopping"),
      h("p", { className: "sub" }, "Sincronizado entre todos os dispositivos"),
      h("input", { type: "email", placeholder: "email@diehl.ia.br", value: email,
        onChange: e => { setEmail(e.target.value); setError(""); }, autoComplete: "email" }),
      h("input", { type: "password", placeholder: "Senha", value: pass,
        onChange: e => { setPass(e.target.value); setError(""); },
        autoComplete: mode === "login" ? "current-password" : "new-password",
        onKeyDown: e => { if (e.key === "Enter") handle(mode === "login" ? onLogin : onSignup); }
      }),
      error && h("div", { className: "err" }, error),
      mode === "login"
        ? h(React.Fragment, null,
            h("button", { className: "btn-go", disabled: loading, onClick: () => handle(onLogin) },
              loading ? "Entrando..." : "🔑 Entrar"),
            h("div", { className: "divider" }),
            h("button", { className: "btn-alt", onClick: () => { setMode("signup"); setError(""); } },
              "Criar conta nova"),
          )
        : h(React.Fragment, null,
            h("button", { className: "btn-go", disabled: loading, onClick: () => handle(onSignup) },
              loading ? "Criando..." : "✨ Criar conta"),
            h("div", { className: "divider" }),
            h("button", { className: "btn-alt", onClick: () => { setMode("login"); setError(""); } },
              "← Voltar ao login"),
          ),
      h("p", { className: "hint" }, "🔒 Acesso restrito a @diehl.ia.br")
    )
  );
}

function RootApp() {
  const [user, setUser] = uS(null);
  const [ready, setReady] = uS(false);

  uE(() => {
    return firebase.auth().onAuthStateChanged((u) => {
      window.__FIREBASE_USER__ = u;
      setUser(u);
      setReady(true);
    });
  }, []);

  const doLogin = (e, p) => firebase.auth().signInWithEmailAndPassword(e, p);
  const doSignup = (e, p) => firebase.auth().createUserWithEmailAndPassword(e, p);
  const doLogout = () => { firebase.auth().signOut(); window.__FIREBASE_USER__ = null; };

  if (!ready) {
    return h("div", { className: "login-wrap" },
      h("div", { style: { textAlign: "center" } },
        h("div", { style: { fontSize: 32, marginBottom: 12 } }, "⏳"),
        h("p", { style: { color: "#64748b" } }, "Carregando...")
      )
    );
  }

  if (!user) {
    return h(LoginScreen, { onLogin: doLogin, onSignup: doSignup });
  }

  return h("div", null,
    h("div", { className: "user-bar" },
      h("span", null, "🔒 " + user.email),
      h("button", { onClick: doLogout }, "Sair")
    ),
    h(App)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(RootApp));
  </script>
